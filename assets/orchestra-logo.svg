<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e"/>
      <stop offset="100%" style="stop-color:#1a0f0a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="center-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c026d3"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="outer-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pulse">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle hex grid background -->
  <g opacity="0.06" stroke="#f59e0b" stroke-width="1" fill="none">
    <polygon points="256,60 296,82 296,126 256,148 216,126 216,82"/>
    <polygon points="256,148 296,170 296,214 256,236 216,214 216,170"/>
    <polygon points="256,236 296,258 296,302 256,324 216,302 216,258"/>
    <polygon points="256,324 296,346 296,390 256,412 216,390 216,346"/>
    <polygon points="170,104 210,126 210,170 170,192 130,170 130,126"/>
    <polygon points="342,104 382,126 382,170 342,192 302,170 302,126"/>
    <polygon points="170,280 210,302 210,346 170,368 130,346 130,302"/>
    <polygon points="342,280 382,302 382,346 342,368 302,346 302,302"/>
  </g>

  <!-- Connection lines between nodes -->
  <g stroke="url(#edge)" stroke-width="3" opacity="0.7" filter="url(#soft-glow)">
    <!-- Center to outer nodes -->
    <line x1="256" y1="256" x2="256" y2="148"/>
    <line x1="256" y1="256" x2="340" y2="206"/>
    <line x1="256" y1="256" x2="340" y2="306"/>
    <line x1="256" y1="256" x2="256" y2="364"/>
    <line x1="256" y1="256" x2="172" y2="306"/>
    <line x1="256" y1="256" x2="172" y2="206"/>
    <!-- Outer ring connections -->
    <line x1="256" y1="148" x2="340" y2="206"/>
    <line x1="340" y1="206" x2="340" y2="306"/>
    <line x1="340" y1="306" x2="256" y2="364"/>
    <line x1="256" y1="364" x2="172" y2="306"/>
    <line x1="172" y1="306" x2="172" y2="206"/>
    <line x1="172" y1="206" x2="256" y2="148"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="115" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <!-- Outer nodes (agents) -->
  <g filter="url(#glow)">
    <!-- Top -->
    <circle cx="256" cy="148" r="22" fill="url(#outer-node)"/>
    <circle cx="256" cy="148" r="14" fill="#0f0a1e"/>
    <circle cx="256" cy="148" r="7" fill="#06b6d4"/>
    <!-- Top-right -->
    <circle cx="340" cy="206" r="22" fill="url(#outer-node)"/>
    <circle cx="340" cy="206" r="14" fill="#0f0a1e"/>
    <circle cx="340" cy="206" r="7" fill="#7c3aed"/>
    <!-- Bottom-right -->
    <circle cx="340" cy="306" r="22" fill="url(#outer-node)"/>
    <circle cx="340" cy="306" r="14" fill="#0f0a1e"/>
    <circle cx="340" cy="306" r="7" fill="#06b6d4"/>
    <!-- Bottom -->
    <circle cx="256" cy="364" r="22" fill="url(#outer-node)"/>
    <circle cx="256" cy="364" r="14" fill="#0f0a1e"/>
    <circle cx="256" cy="364" r="7" fill="#7c3aed"/>
    <!-- Bottom-left -->
    <circle cx="172" cy="306" r="22" fill="url(#outer-node)"/>
    <circle cx="172" cy="306" r="14" fill="#0f0a1e"/>
    <circle cx="172" cy="306" r="7" fill="#06b6d4"/>
    <!-- Top-left -->
    <circle cx="172" cy="206" r="22" fill="url(#outer-node)"/>
    <circle cx="172" cy="206" r="14" fill="#0f0a1e"/>
    <circle cx="172" cy="206" r="7" fill="#f59e0b"/>
  </g>

  <!-- Center conductor node (larger, brighter) -->
  <circle cx="256" cy="256" r="16" fill="#f59e0b" opacity="0.2" filter="url(#pulse)"/>
  <circle cx="256" cy="256" r="36" fill="url(#center-node)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="24" fill="#0f0a1e"/>
  <circle cx="256" cy="256" r="12" fill="url(#center-node)"/>

  <!-- Conductor baton — diagonal line from center -->
  <line x1="256" y1="256" x2="310" y2="176" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.9" filter="url(#soft-glow)"/>
  <circle cx="314" cy="170" r="6" fill="#f59e0b" filter="url(#soft-glow)"/>

  <!-- Corner accent dots -->
  <circle cx="96" cy="96" r="6" fill="#c026d3" opacity="0.5" filter="url(#soft-glow)"/>
  <circle cx="416" cy="96" r="4" fill="#f59e0b" opacity="0.4"/>
  <circle cx="416" cy="416" r="6" fill="#06b6d4" opacity="0.5" filter="url(#soft-glow)"/>
  <circle cx="96" cy="416" r="4" fill="#7c3aed" opacity="0.4"/>
</svg>
