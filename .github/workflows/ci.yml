name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Elixir / Mix: all umbrella apps
  # --------------------------------------------------------------------------
  elixir:
    name: Elixir tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install dependencies (excluding musician_tui — ratatouille→ex_termbox uses removed Python imp module)
        run: mix deps.get --exclude-apps musician_tui

      - name: Remove broken transitive deps and update lock
        run: |
          rm -rf deps/ex_termbox deps/ratatouille _build/MIX/@lib/musician_tui 2>/dev/null || true
          mix lock --remove ratatouille 2>/dev/null || true

      - name: Run tests with coverage and generate XML
        run: bash .github/workflows/gen-coverage.sh

      - name: Check coverage thresholds
        run: |
          # Write coverage check script to file (avoids heredoc YAML indentation issues).
          printf '%s\n' \
            'coverage_path = "_build/coverage/coverage.xml"' \
            'thresholds = %{' \
            '  "musician_memory" => 90,' \
            '  "musician_session" => 80,' \
            '  "orchestra" => 80,' \
            '  "musician_tools" => 80,' \
            '  "musician_skills" => 80,' \
            '  "musician_plugins" => 85,' \
            '  "musician_core" => 95,' \
            '  "musician_auth" => 80' \
            '}' \
            'content = File.read!(coverage_path)' \
            'failures = for {app, min_pct} <- thresholds, into: [] do' \
            '  app_module = app |> String.split("_") |> Enum.map(&String.capitalize/1) |> Enum.join()' \
            '  pattern = ~r/<package name="Elixir\.#{app_module}"[^>]*line-rate="([0-9.]+)"/,' \
            '  actual = case Regex.run(pattern, content) do' \
            '    [_, rate] -> (String.to_float(rate) * 100) |> Float.round(1) |> trunc()' \
            '    nil -> 0' \
            '  end' \
            '  IO.puts("  #{app}: #{actual}% (minimum #{min_pct}%)")' \
            '  if actual < min_pct, do: {app, min_pct, actual}, else: nil' \
            'end |> Enum.reject(&is_nil/1)' \
            'if failures != [] do' \
            '  IO.puts("\nCoverage below threshold:")' \
            '  for {app, min, actual} <- failures do' \
            '    IO.puts("  #{app}: #{actual}% (minimum #{min}%)")' \
            '  end' \
            '  System.halt(1)' \
            'else' \
            '  IO.puts("\nAll apps meet coverage thresholds.")' \
            'end' > /tmp/check_coverage.exs
          elixir /tmp/check_coverage.exs

  # --------------------------------------------------------------------------
  # Node.js: tests + archgate ADR check
  # --------------------------------------------------------------------------
  node:
    name: Node.js tests & ADR check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Archgate ADR compliance check
        run: npx --yes archgate@latest check

  # --------------------------------------------------------------------------
  # Python: pipeline runner tests + lint
  # --------------------------------------------------------------------------
  python:
    name: Python pipeline-runner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/pipeline_runner

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Mypy type check
        run: poetry run mypy pipeline_runner

      - name: Run tests
        run: poetry run pytest --tb=short

  # --------------------------------------------------------------------------
  # Gate: require all jobs to pass
  # --------------------------------------------------------------------------
  status:
    name: All checks passed
    runs-on: ubuntu-latest
    if: always()
    needs: [elixir, node, python]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.elixir.result }}" != "success" ]] || \
             [[ "${{ needs.node.result }}" != "success" ]] || \
             [[ "${{ needs.python.result }}" != "success" ]]; then
            echo "::error::One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed."
