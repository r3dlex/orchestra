name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Elixir / Mix: all umbrella apps
  # --------------------------------------------------------------------------
  elixir:
    name: Elixir tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install dependencies
        run: mix deps.get

      - name: Run all tests (excluding musician_tui — ex_termbox native ext incompatible with Python 3.12+)
        run: |
          for app in musician_core musician_auth musician_tools musician_skills musician_memory musician_session musician_plugins orchestra; do
            mix test apps/$app --cover || exit 1
          done

      - name: Generate coverage XML
        run: mix test.coverage

      - name: Check coverage thresholds
        run: mix musician.check_coverage

  # --------------------------------------------------------------------------
  # Node.js: tests + archgate ADR check
  # --------------------------------------------------------------------------
  node:
    name: Node.js tests & ADR check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Archgate ADR compliance check
        run: npx --yes archgate@latest check

  # --------------------------------------------------------------------------
  # Python: pipeline runner tests + lint
  # --------------------------------------------------------------------------
  python:
    name: Python pipeline-runner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/pipeline_runner

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Mypy type check
        run: poetry run mypy pipeline_runner

      - name: Run tests
        run: poetry run pytest --tb=short

  # --------------------------------------------------------------------------
  # Gate: require all jobs to pass
  # --------------------------------------------------------------------------
  status:
    name: All checks passed
    runs-on: ubuntu-latest
    if: always()
    needs: [elixir, node, python]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.elixir.result }}" != "success" ]] || \
             [[ "${{ needs.node.result }}" != "success" ]] || \
             [[ "${{ needs.python.result }}" != "success" ]]; then
            echo "::error::One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed."
