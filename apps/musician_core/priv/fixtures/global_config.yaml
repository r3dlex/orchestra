default_provider: minimax
providers:
  minimax:
    api_base: https://api.minimaxi.chat/v1
    model: MiniMax-M2.7
    api_key_env: ANTHROPIC_AUTH_TOKEN
  claude:
    api_base: https://api.minimax.io/anthropic/v1
    model: MiniMax-M2.7
    api_key_env: ANTHROPIC_API_KEY
    native: true
tui:
  theme: solarized
memory:
  nudge_interval_minutes: 30
