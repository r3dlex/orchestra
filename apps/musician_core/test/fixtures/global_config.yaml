default_provider: minimax

providers:
  minimax:
    api_base: https://api.minimax.chat/v1
    model: abab7-chat
    api_key_env: MINIMAX_API_KEY
  claude:
    api_base: https://api.anthropic.com/v1
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    native: true

memory:
  enabled: true
  nudge_interval_minutes: 30

tui:
  theme: solarized
